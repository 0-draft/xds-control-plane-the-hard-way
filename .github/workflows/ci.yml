name: ci

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Drift detection. If upstream Envoy or xds-api break us, this fires
    # before a reader finds out the hard way.
    - cron: "0 3 * * 1"

permissions:
  contents: read

# Opt into Node.js 24 for JavaScript actions. The default flips on
# 2026-06-16; setting this now keeps logs clean of deprecation warnings.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cargo:
    name: cargo check / fmt / clippy
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: chapter-01
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.86.0"
          components: clippy, rustfmt

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: chapter-01

      - name: cargo fmt
        run: cargo fmt --all --check

      - name: cargo check
        run: cargo check --workspace --all-targets

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace --all-targets

  smoke:
    name: docker-compose smoke
    runs-on: ubuntu-24.04
    needs: cargo
    defaults:
      run:
        working-directory: chapter-01
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Cache docker layers
        uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache
          key: buildx-${{ runner.os }}-${{ hashFiles('chapter-01/**/Cargo.toml', 'chapter-01/**/Cargo.lock', 'chapter-01/Dockerfile') }}
          restore-keys: |
            buildx-${{ runner.os }}-

      - name: Build images
        env:
          DOCKER_BUILDKIT: "1"
          COMPOSE_DOCKER_CLI_BUILD: "1"
        run: docker compose build --pull

      - name: Start stack
        run: docker compose up -d

      - name: Wait for Envoy to converge
        run: |
          set -e
          for i in $(seq 1 60); do
            if curl -sf -o /dev/null http://localhost:10000/; then
              echo "Envoy is serving traffic after ${i}s"
              curl -sS http://localhost:10000/
              exit 0
            fi
            sleep 1
          done
          echo "Envoy did not converge in time"
          exit 1

      - name: Verify ACK pattern in controlplane log
        run: |
          set -e
          # Strip ANSI escapes defensively even though NO_COLOR=1 is set.
          docker compose logs --no-log-prefix controlplane \
            | sed 's/\x1b\[[0-9;]*[mGKHF]//g' > /tmp/cp.log
          missing=0
          for ty in LDS RDS CDS EDS; do
            if ! grep -E "ACK.*ty=\"?$ty\"?" /tmp/cp.log | grep -q "version=v1"; then
              echo "MISSING ACK for $ty"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "--- controlplane log ---"
            cat /tmp/cp.log
            exit 1
          fi
          echo "All four ACKs (LDS/RDS/CDS/EDS) observed at v1"

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --tail=300 controlplane envoy upstream

      - name: Tear down
        if: always()
        run: docker compose down -v
