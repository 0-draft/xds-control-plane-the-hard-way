services:
  upstream:
    build:
      context: .
      dockerfile: upstream/Dockerfile
    container_name: hardway-upstream
    expose:
      - "9000"
    environment:
      RUST_LOG: info
      UPSTREAM_PORT: "9000"

  controlplane:
    build:
      context: .
      dockerfile: controlplane/Dockerfile
    container_name: hardway-controlplane
    expose:
      - "18000"
    depends_on:
      - upstream
    environment:
      RUST_LOG: info

  envoy:
    image: envoyproxy/envoy:v1.32-latest
    container_name: hardway-envoy
    command: ["-c", "/etc/envoy/envoy.yaml", "-l", "info"]
    volumes:
      - ./envoy/bootstrap.yaml:/etc/envoy/envoy.yaml:ro
    ports:
      - "10000:10000"
      - "9901:9901"
    depends_on:
      - controlplane
