node:
  id: envoy-hardway-01
  cluster: envoy-hardway

# Bootstrap the Listener and Cluster collections by xdstp:// glob locators.
# Envoy then follows the graph into RDS/EDS singletons, also by xdstp name.
# Everything rides one Delta ADS stream: Envoy cannot yet map an authority to a
# separate ConfigSource, so both authorities (hardway, edge) resolve here.
dynamic_resources:
  ads_config:
    api_type: DELTA_GRPC
    transport_api_version: V3
    grpc_services:
      - envoy_grpc:
          cluster_name: xds_cluster
    set_node_on_first_message_only: true
  cds_config:
    ads: {}
  cds_resources_locator: "xdstp://edge/envoy.config.cluster.v3.Cluster/*"
  lds_config:
    ads: {}
  lds_resources_locator: "xdstp://hardway/envoy.config.listener.v3.Listener/*"

static_resources:
  clusters:
    - name: xds_cluster
      type: STRICT_DNS
      connect_timeout: 1s
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
      load_assignment:
        cluster_name: xds_cluster
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: controlplane
                      port_value: 18000

admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901
